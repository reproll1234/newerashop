<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEW ERA SHOP Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0a0510; 
            --card-bg: rgba(15, 10, 25, 0.6); 
            --accent-cyan: #00ffff; 
            --accent-pink: #ff00ff;
            --accent-green: #00ff66;
            --text-main: #ffffff; 
            --text-muted: #a09eb0; 
            --border-color: rgba(0, 255, 255, 0.3);
            --btn-bg: rgba(20, 10, 35, 0.7);
            --glow-pink: 0 0 10px rgba(255, 0, 255, 0.5);
            --glow-cyan: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        * { box-sizing: border-box; }
        body {
            background-image: url('https://i.postimg.cc/bw2d9Fcm/3f732b59-0559-42b6-a475-7b2f8355a333.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; padding-bottom: 100px;
            -webkit-tap-highlight-color: transparent;
        }
        .top-bar { 
            background: rgba(10, 5, 15, 0.8); backdrop-filter: blur(10px);
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255,0,255,0.3); position: sticky; top: 0; z-index: 5000; box-shadow: var(--glow-pink);
        }
        .top-balance .value { font-size: 18px; font-weight: bold; color: var(--accent-cyan); text-shadow: var(--glow-cyan); transition: 0.3s; }
        .app-title { font-weight: bold; font-size: 16px; color: var(--text-main); text-align: center; text-shadow: 0 0 8px var(--accent-pink); letter-spacing: 2px; }
        .app-subtitle { font-size: 11px; font-weight: 300; color: var(--text-muted); letter-spacing: 1px; margin-top: 2px; }
        .card { background: var(--card-bg); backdrop-filter: blur(8px); margin: 12px; border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); box-shadow: var(--glow-cyan); }
        .section-title { font-size: 14px; margin: 15px 12px 5px 12px; color: var(--accent-pink); font-weight: bold; text-transform: uppercase; text-shadow: var(--glow-pink); }
        .btn-primary { background: linear-gradient(90deg, #aa00ff, #00ffff); color: #000; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4); transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-menu { background: var(--btn-bg); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 15px; border-radius: 8px; width: 100%; margin-bottom: 12px; font-weight: bold; cursor: pointer; box-shadow: var(--glow-cyan); backdrop-filter: blur(5px); transition: 0.3s; }
        .grid-container { display: flex; flex-wrap: wrap; gap: 10px; margin: 0 12px 20px 12px; justify-content: center; }
        .grid-btn { background: var(--btn-bg); backdrop-filter: blur(5px); border: 1px solid rgba(255,0,255,0.4); color: #fff; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; flex: 1 1 calc(50% - 10px); min-width: 140px; max-width: calc(50% - 5px); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); transition: 0.3s; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }
        .product-card { background: var(--card-bg); backdrop-filter: blur(8px); border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--glow-cyan); position: relative; }
        .product-img img { width: 100%; height: 110px; object-fit: cover; display: block; }
        .stock-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); padding: 3px 6px; border-radius: 5px; font-size: 10px; font-weight: bold; border: 1px solid; }
        .stock-good { color: var(--accent-green); border-color: var(--accent-green); box-shadow: 0 0 5px rgba(0,255,102,0.5); }
        .stock-low { color: var(--accent-pink); border-color: var(--accent-pink); box-shadow: var(--glow-pink); }
        .product-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #fff; text-shadow: 0 0 3px #000; }
        .product-price { color: var(--accent-cyan); font-weight: bold; margin-bottom: 8px; text-shadow: var(--glow-cyan); }
        .qty-controls { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); border-radius: 6px; margin-bottom: 8px; padding: 2px; border: 1px solid rgba(255,255,255,0.1); }
        .qty-btn { background: none; border: none; color: var(--accent-cyan); font-size: 18px; padding: 5px 12px; cursor: pointer; text-shadow: var(--glow-cyan); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 5, 15, 0.85); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid rgba(0, 255, 255, 0.3); box-shadow: 0 -2px 15px rgba(0, 255, 255, 0.2); z-index: 6000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--accent-cyan); text-shadow: var(--glow-cyan); }
        .view-content { display: none; }
        .view-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slot-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .slot-box { background: rgba(0, 0, 0, 0.7); border: 2px solid var(--accent-cyan); border-radius: 10px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: inset var(--glow-cyan); text-shadow: 0 0 10px #fff; }
        .coupon-btn { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 8px; cursor: pointer; transition: 0.3s; }
        .cpn-cyan { border: 1px solid var(--accent-cyan); color: var(--accent-cyan); text-shadow: var(--glow-cyan); box-shadow: inset 0 0 5px rgba(0, 255, 255, 0.2); }
        .cpn-pink { border: 1px solid var(--accent-pink); color: var(--accent-pink); text-shadow: var(--glow-pink); box-shadow: inset 0 0 5px rgba(255, 0, 255, 0.2); }
        .cpn-green { border: 1px solid var(--accent-green); color: var(--accent-green); text-shadow: 0 0 10px rgba(0,255,102,0.5); box-shadow: inset 0 0 5px rgba(0, 255, 102, 0.2); }
        input[type="text"] { background: rgba(0,0,0,0.5); border: 1px solid var(--accent-pink); color: white; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; width: 100%; box-shadow: inset var(--glow-pink); }
        .carousel { position: relative; margin: 12px; border-radius: 12px; border: 1px solid var(--accent-cyan); box-shadow: var(--glow-cyan); overflow: hidden; background: var(--card-bg); height: 180px; }
        .carousel-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; height: 100%; }
        .carousel-track::-webkit-scrollbar { display: none; }
        .carousel-slide { flex: 0 0 100%; min-width: 100%; height: 100%; position: relative; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 15px; scroll-snap-align: center; }
        .carousel-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(0deg, rgba(10,5,15,0.95) 0%, rgba(10,5,15,0.7) 100%); z-index: 1; }
        .carousel-text { position: relative; z-index: 2; color: #fff; font-size: 13px; font-weight: bold; line-height: 1.4; text-shadow: 0 0 5px #000; }
        .carousel-dots { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; z-index: 3; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--accent-cyan); box-shadow: var(--glow-cyan); width: 16px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-balance">
            <div style="font-size: 10px; color: var(--text-muted);" data-i18n="top_balance">Balance</div>
            <div class="value" id="top-balance-display">0 HUF</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div class="app-title">NEW ERA SHOP</div>
            <div class="app-subtitle">Special's</div>
        </div>
        <button id="btn-lang" onclick="toggleLanguage()" style="background:none; border:1px solid var(--accent-pink); color:var(--accent-pink); border-radius:5px; padding:4px 10px; font-weight:bold; cursor:pointer; box-shadow: var(--glow-pink);">EN</button>
    </div>

    <div id="view-home" class="view-content active">
        <div class="carousel">
            <div class="carousel-track" id="home-carousel">
                <div class="carousel-slide" style="background-image: url('https://i.postimg.cc/bw2d9Fcm/3f732b59-0559-42b6-a475-7b2f8355a333.jpg');">
                    <div class="carousel-overlay"></div>
                    <div class="carousel-text">
                        <div style="font-size: 15px; margin-bottom: 8px; color: var(--accent-green); text-shadow: 0 0 10px rgba(0,255,102,0.5);" data-i18n="car_1_title">Update: 2026.03.23</div>
                        <div style="font-weight: normal;" data-i18n="car_1_desc">Nyíregyháza<br>Miskolc<br>Győr<br>Kecskemét</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="card" style="padding: 0; position: relative; border: 1px solid var(--accent-pink); box-shadow: var(--glow-pink);">
            <img src="https://i.postimg.cc/zGt3CbfV/1.png" style="width: 100%; display: block; border-radius: 12px 12px 0 0;">
            <div style="padding: 15px; text-align: center; background: rgba(10, 5, 15, 0.85); border-radius: 0 0 12px 12px;">
                <h3 style="margin: 0; color: var(--accent-cyan);" data-i18n="welcome_title">ÜDVÖZLÜNK!</h3>
                <p style="margin: 5px 0 0 0; font-size: 12px; color: var(--text-muted);" data-i18n="welcome_desc">A legjobb minőség, a leggyorsabb kiszolgálás.</p>
            </div>
        </div>
        <div style="padding: 0 12px;"><button class="btn-menu" onclick="navigateToTab('view-menu')" data-i18n="btn_regions">📋 RÉGIÓ VÁLASZTÁSA</button></div>
    </div>

    <div id="view-menu" class="view-content">
        <div class="section-title">Városok</div>
        <div class="grid-container">
            <div class="grid-btn city-btn">Corvin</div>
            <div class="grid-btn city-btn">Nyugati</div>
            <div class="grid-btn city-btn">Győr</div>
            <div class="grid-btn city-btn">Miskolc</div>
        </div>
    </div>

    <div id="view-products" class="view-content">
        <div style="padding: 12px; display: flex; justify-content: space-between; align-items: center;">
            <div onclick="navigateToTab('view-menu')" style="color: var(--accent-pink); font-weight: bold; cursor: pointer;" data-i18n="btn_back">← Vissza</div>
            <div id="current-city-label" style="font-weight: bold;">Város</div>
        </div>
        <div class="product-grid" id="product-list-container"></div>
    </div>

    <div id="view-cart" class="view-content">
        <div class="card">
            <h3 style="text-align: center; color: var(--accent-cyan);" data-i18n="cart_title">Kosár</h3>
            <div id="cart-items-container"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-target="view-home">🏠<span data-i18n="nav_home">Home</span></div>
        <div class="nav-item" data-target="view-menu">📋<span data-i18n="nav_menu">Menu</span></div>
        <div class="nav-item" data-target="view-cart">🛒<span data-i18n="nav_cart">Kosár</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let userBalance = 0;
        let legitCoins = 0;
        let activeDiscount = 0;
        let cart = [];
        let currentLang = 'hu';

        const translations = {
            hu: { top_balance: "Egyenleg", nav_home: "Home", nav_menu: "Menu", nav_cart: "Kosár", welcome_title: "ÜDVÖZLÜNK!", welcome_desc: "Minőség és sebesség.", btn_regions: "📋 RÉGIÓ VÁLASZTÁSA", btn_back: "← Vissza", cart_title: "Kosár", cart_empty: "Üres a kosár.", stock_in: "Raktáron:", btn_add: "Hozzáad" },
            en: { top_balance: "Balance", nav_home: "Home", nav_menu: "Menu", nav_cart: "Cart", welcome_title: "WELCOME!", welcome_desc: "Quality and speed.", btn_regions: "📋 SELECT REGION", btn_back: "← Back", cart_title: "Cart", cart_empty: "Empty cart.", stock_in: "In stock:", btn_add: "Add" }
        };

        const products = [
            { id: 1, name: "LCG 17 (3g)", price: 21500, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 2, name: "LCG 17 (5g)", price: 35000, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 3, name: "Purple Runtz (3g)", price: 24000, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 4, name: "Purple Runtz (5g)", price: 37000, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 5, name: "Mephedron (2g)", price: 34000, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 6, name: "Mephedron (3g)", price: 50000, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 7, name: "Cocaine (0.5g)", price: 48000, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 8, name: "Cocaine (1g)", price: 50000, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 9, name: "MDMA (2g)", price: 24000, img: "https://i.postimg.cc/zGt3CbfV/1.png" },
            { id: 10, name: "XTC (280MG)", price: 15500, img: "https://i.postimg.cc/zGt3CbfV/1.png" }
        ];

        function getStr(key) { return translations[currentLang][key]; }

        function showView(viewId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function navigateToTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const nav = document.querySelector(`.nav-item[data-target="${tabId}"]`);
            if(nav) nav.classList.add('active');
            showView(tabId);
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => navigateToTab(item.getAttribute('data-target')));
        });

        document.querySelectorAll('.city-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.getElementById('current-city-label').innerText = this.innerText;
                renderProducts();
                showView('view-products');
            });
        });

        function renderProducts() {
            const container = document.getElementById('product-list-container');
            container.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img"><img src="${p.img}"><div class="stock-badge stock-good">${getStr('stock_in')} 5</div></div>
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">${p.price.toLocaleString()} HUF</div>
                        <button class="btn-primary" style="padding:8px; font-size:12px;">${getStr('btn_add')}</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'hu' ? 'en' : 'hu';
            document.getElementById('btn-lang').innerText = currentLang === 'hu' ? 'EN' : 'HU';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
        }
    </script>
</body>
</html>
